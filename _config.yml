title: Academic Help
description: Comprehensive guides and resources to help students improve academic performance
url: "https://academicsupport.co.il"
baseurl: ""

permalink: pretty

markdown: kramdown
kramdown:
  input: GFM

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

defaults:
  - scope:
      path: "academic-writing"
    values:
      layout: "default"
  - scope:
      path: "study-skills"
    values:
      layout: "default"
  - scope:
      path: "student-resources"
    values:
      layout: "default"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - index.md
